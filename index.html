<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Zoning Conflicts — Guided Map</title>

  <!-- ArcGIS Maps SDK for JavaScript 5.0 (CSS) -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/light/main.css" />

  <style>
    :root {
      --panel-width: 420px;
      --accent: #c8472b;
      --card-bg: #ffffff;
      --page-bg: #f4f1ec;
      --text: #1f2421;
      --muted: #6b6b6b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--text); }

    /* Layout: scrolling cards on the left, sticky map on the right */
    #app { display: flex; min-height: 100vh; background: var(--page-bg); }

    #scroll-col {
      width: var(--panel-width);
      min-width: var(--panel-width);
      padding: 0 0 60vh 0;       /* tail space so the last card can reach center */
    }

    #map-col {
      flex: 1 1 auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    #viewDiv { width: 100%; height: 100%; }

    /* Intro / cover */
    .intro {
      padding: 28px 28px 10px 28px;
      min-height: 60vh;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .intro h1 { font-size: 2rem; line-height: 1.15; margin: 0 0 10px; }
    .intro p  { color: var(--muted); margin: 0; }
    .intro .hint { margin-top: 18px; font-size: 0.85rem; color: var(--accent); letter-spacing: 0.04em; text-transform: uppercase; }

    /* Cards */
    .step {
      margin: 0 24px 50vh 24px;          /* big gap = one card active at a time */
      padding: 22px 24px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      opacity: 0.55;
    }
    .step.is-active {
      border-left-color: var(--accent);
      box-shadow: 0 6px 26px rgba(0,0,0,0.16);
      opacity: 1;
      transform: translateY(-2px);
    }
    .step .num {
      display: inline-block; min-width: 30px; height: 30px; line-height: 30px;
      text-align: center; border-radius: 50%;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .step h2 { font-size: 1.15rem; margin: 0 0 8px; }
    .step .meta { font-size: 0.78rem; color: var(--muted); margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.03em; }
    .step .desc { font-size: 0.95rem; line-height: 1.5; margin: 0; }
    .step .desc.null { color: var(--muted); font-style: italic; }

    .loading { padding: 28px; color: var(--muted); }

    @media (max-width: 800px) {
      #app { flex-direction: column-reverse; }
      #map-col { height: 55vh; position: sticky; top: 0; }
      #scroll-col { width: 100%; min-width: 0; }
      .step { margin: 0 16px 45vh 16px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scroll-col">
      <div class="intro">
        <h1>Identified Zoning Conflicts</h1>
        <p>Half Moon Bay — Local Coastal Land Use Plan. Scroll to move through each site; the map flies to each parcel.</p>
        <div class="hint">Scroll to begin ↓</div>
      </div>
      <div id="steps"><div class="loading">Loading sites…</div></div>
    </div>
    <div id="map-col"><div id="viewDiv"></div></div>
  </div>

  <!-- scrollama for scroll triggers -->
  <script src="https://unpkg.com/intersection-observer@0.12.2/intersection-observer.js"></script>
  <script src="https://unpkg.com/scrollama@3.2.0/build/scrollama.min.js"></script>

  <!-- ArcGIS Maps SDK 4.x AMD loader (robust single-file usage) -->
  <script src="https://js.arcgis.com/4.32/"></script>

  <script>
  /* ===================== CONFIG — EDIT THESE ===================== */
  const CONFIG = {
    // The WEB MAP supplies all the visible context layers (parcels, zoning,
    // land use, etc.) exactly as arranged in AGOL.
    webMapId: "b9702958420446f78dfdc370c9fc5b4c",

    // The layer that drives the scroll + fly-to. Matched by title inside the
    // web map; if that fails, the direct service URL below is used as backup.
    layerTitle: "Identified Conflicts",
    serviceUrl: "https://services3.arcgis.com/DekmcG0oYPlmT2HS/arcgis/rest/services/Identified_Conflicts/FeatureServer",

    // Emphasize the active conflict polygon (outline) without hiding context.
    emphasizeActiveLayer: true,

    // Field names — MUST match the published layer's field names exactly.
    // AGOL usually sanitizes on publish (spaces/parentheses -> underscores).
    // Check: item page -> the layer -> Data tab -> Fields, or add ?f=pjson to the layer URL.
    fields: {
      objectId:   "OBJECTID",
      orderBy:    "Item_Number",        // Double — west-to-east sequence
      title:      "Site_Name",          // String — card heading
      titleFallback: "Item_Number",     // used when Site_Name is null/blank
      description:"Notes",              // String — card body
      // optional extra line under the title (set to null to hide):
      meta:       "Proposed_Zoning"     // String
    },

    nullToken: "<null>",                 // value used in the data for gaps
    zoomPadding: 1.6,                    // >1 zooms out a bit so the polygon isn't edge-to-edge
    flyDuration: 1200,                   // ms for the goTo animation
    basemap: "gray-vector"
  };
  /* ============================================================== */

  require([
    "esri/WebMap",
    "esri/Map",
    "esri/views/MapView",
    "esri/layers/FeatureLayer",
    "esri/Graphic",
    "esri/geometry/Extent"
  ], function (WebMap, Map, MapView, FeatureLayer, Graphic, Extent) {

    const F = CONFIG.fields;

    let map, view, layer = null, activeHandle = null;

    function isNull(v) {
      return v === null || v === undefined || v === "" || v === CONFIG.nullToken;
    }

    const HIGHLIGHT = {
      type: "simple",
      symbol: {
        type: "simple-fill",
        color: [200, 71, 43, 0.18],
        outline: { color: [200, 71, 43, 1], width: 1.5 }
      }
    };

    if (CONFIG.serviceUrl) { /* serviceUrl kept only as fallback below */ }

    // Always load the full web map so every context layer is visible.
    map = new WebMap({ portalItem: { id: CONFIG.webMapId } });
    view = makeView();

    view.when(function () {
      const want = CONFIG.layerTitle.toLowerCase();
      let found = map.layers.find(l => (l.title || "").toLowerCase() === want)
               || map.layers.find(l => (l.title || "").toLowerCase().indexOf(want) !== -1);

      if (found) {
        layer = found;
        layer.outFields = ["*"];
        if (CONFIG.emphasizeActiveLayer) {
          // give the driver layer a clean outline so the highlight reads on top
          // of the context layers (does not hide anything beneath it)
          layer.renderer = {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: [200, 71, 43, 0.12],
              outline: { color: [200, 71, 43, 0.9], width: 1.25 }
            }
          };
        }
        return layer.when(loadFeatures);
      }

      // Fallback: layer not found in the web map — add the service URL on top.
      if (CONFIG.serviceUrl && CONFIG.serviceUrl.trim()) {
        const base = CONFIG.serviceUrl.trim().replace(/\/+$/, "");
        layer = new FeatureLayer({ url: base + "/0", outFields: ["*"], renderer: HIGHLIGHT });
        map.add(layer);
        return layer.when(loadFeatures);
      }

      const names = map.layers.map(l => l.title).toArray().join(", ");
      showLayerError(new Error('Layer "' + CONFIG.layerTitle + '" not found. Layers in this map: ' + names));
    }).catch(showLayerError);

    function makeView() {
      return new MapView({
        container: "viewDiv",
        map: map,
        constraints: { snapToZoom: false },
        ui: { components: ["zoom", "attribution"] }
      });
    }

    function showLayerError(err) {
      document.getElementById("steps").innerHTML =
        '<div class="loading">Could not load the layer: ' + (err && err.message ? err.message : err) +
        '</div>';
    }

    function loadFeatures() {
      const q = layer.createQuery();
      q.where = "1=1";
      q.outFields = ["*"];
      q.returnGeometry = true;
      q.orderByFields = [F.orderBy + " ASC"];

      return layer.queryFeatures(q).then(function (result) {
        const feats = result.features;
        if (!feats.length) {
          document.getElementById("steps").innerHTML =
            '<div class="loading">No features returned. Check the field names in CONFIG match the layer.</div>';
          return;
        }
        buildCards(feats);
        wireScrollama(feats);
        view.goTo(feats.map(f => f.geometry)).catch(()=>{});
      }).catch(function (err) {
        document.getElementById("steps").innerHTML =
          '<div class="loading">Query failed: ' + (err && err.message ? err.message : err) +
          '<br><br>Most likely the <code>orderBy</code> field name ("' + F.orderBy + '") is wrong. ' +
          'Open the layer\'s Data tab in AGOL to see the real field names.</div>';
      });
    }

    function cardTitle(attr) {
      const t = attr[F.title];
      if (!isNull(t)) return t;
      return "Site " + attr[F.titleFallback];
    }

    function buildCards(feats) {
      const wrap = document.getElementById("steps");
      wrap.innerHTML = "";
      feats.forEach(function (f, i) {
        const a = f.attributes;
        const div = document.createElement("div");
        div.className = "step";
        div.dataset.index = i;

        const num = !isNull(a[F.orderBy]) ? a[F.orderBy] : (i + 1);
        const metaVal = (F.meta && !isNull(a[F.meta])) ? a[F.meta] : null;
        const descVal = a[F.description];
        const descNull = isNull(descVal);

        div.innerHTML =
          '<span class="num">' + num + '</span>' +
          '<h2>' + escapeHtml(cardTitle(a)) + '</h2>' +
          (metaVal ? '<p class="meta">' + escapeHtml(metaVal) + '</p>' : '') +
          '<p class="desc' + (descNull ? ' null' : '') + '">' +
            escapeHtml(descNull ? "No description available." : descVal) +
          '</p>';

        wrap.appendChild(div);
      });
    }

    function flyTo(feature) {
      const geom = feature.geometry;
      if (!geom) return;
      const ext = geom.extent ? geom.extent.clone().expand(CONFIG.zoomPadding) : null;
      view.goTo(ext || geom, { duration: CONFIG.flyDuration, easing: "ease-in-out" }).catch(()=>{});

      // Emphasize the active polygon.
      view.whenLayerView(layer).then(function (lv) {
        if (activeHandle) { activeHandle.remove(); activeHandle = null; }
        activeHandle = lv.highlight(feature);
      });
    }

    function wireScrollama(feats) {
      const scroller = scrollama();
      scroller
        .setup({ step: "#steps .step", offset: 0.55, order: true })
        .onStepEnter(function (resp) {
          document.querySelectorAll("#steps .step").forEach(s => s.classList.remove("is-active"));
          resp.element.classList.add("is-active");
          flyTo(feats[+resp.element.dataset.index]);
        });
      window.addEventListener("resize", scroller.resize);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
      ));
    }
  });
  </script>
</body>
</html>
